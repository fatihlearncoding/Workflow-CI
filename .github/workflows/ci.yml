name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: harga-pangan-jatim

jobs:
  train-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Check Env
        run: |
          python --version
          pip --version
          docker --version

      - name: Install dependencies
        run: pip install mlflow==2.19.0

      - name: Run mlflow project
        run: |
          cd MLProject
          mlflow run . --env-manager=local \
            --experiment-name "Harga Pangan Jatim - CI Retraining"

      - name: Get latest MLflow run_id
        id: runid
        run: |
          cd MLProject
          RUN_ID=$(python -c "
          import mlflow
          mlflow.set_tracking_uri('file:./mlruns')
          exp = mlflow.get_experiment_by_name('Harga Pangan Jatim - CI Retraining')
          run = mlflow.search_runs([exp.experiment_id], order_by=['start_time DESC'], max_results=1)
          print(run.iloc[0]['run_id'])
          " | tail -1)
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Latest run_id: $RUN_ID"

      - name: Install Python dependencies
        run: pip install pandas==2.3.3 numpy==2.5.1 scikit-learn==1.9.0 joblib==1.5.3

      - name: Upload to GitHub (model artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-model-${{ steps.runid.outputs.run_id }}
          path: MLProject/mlruns/
          retention-days: 30

      - name: Build Docker Model
        run: |
          cd MLProject
          export MLFLOW_TRACKING_URI=file:./mlruns
          mlflow models build-docker \
            -m "runs:/${{ steps.runid.outputs.run_id }}/model" \
            -n ${{ env.IMAGE_NAME }} \
            --env-manager local

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker Image
        run: |
          docker tag ${{ env.IMAGE_NAME }} ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          docker tag ${{ env.IMAGE_NAME }} ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
